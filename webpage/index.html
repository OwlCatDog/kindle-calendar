<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="./css/time.css">
	<title>Displayer</title>
</head>

<body>
	<div id="main">
		<div class="header">
			<div>
				<div id="sentence">
				</div>
				<div id="warning">
					<!-- <img src="" alt="" srcset="" id="warnIcon">
					<div id="warnText"></div> -->
				</div>
			</div>
			<div class="battery">
				<img src="" id="batt">
				<div id="batteryLevel"></div>
			</div>
		</div>
		<div class="page">
			<div class="time_container">
				<div id="time"></div>
				<div class="week_day">
					<div id="date"></div>
					<div id="week"></div>
				</div>
			</div>
			<div class="date_container">
				<!-- <div class="date" id="date"></div>-->
				<div class="date" id="lunar"></div>
				<div class="date" id="festival"></div>
			</div>
			<img id="widgetCacheImage" src="/widget.png" alt="天气信息">
			<div id="sen">
				<div id="temp" class="sen-row">
					<div class="sen-label">
						<img src="./img/sen/temperature.png" alt="温度">
						<span class="sen-name">温度</span>
					</div>
					<div class="sen-values" id="temp-values"></div>
				</div>
				<div id="humi" class="sen-row">
					<div class="sen-label">
						<img src="./img/sen/湿度.png" alt="湿度">
						<span class="sen-name">湿度</span>
					</div>
					<div class="sen-values" id="humi-values"></div>
				</div>
				<div id="sensor-timeout" class="sen-timeout" hidden></div>
			</div>
			<!-- <div id="he-plugin-standard"></div> -->
		</div><!-- <-footer-> -->

</body>
<script src="./config.js"></script>
<script src="./js/time.js"></script>
